# Single source of truth for this repo's labels.
# Edit and merge to main -> .github/workflows/label-sync.yml runs and
# reconciles labels via the GitHub API.
#
# Each label's `description` is a classification rubric. Claude triage
# reads them via `gh label list` and uses them to decide what to apply.

# ---- TYPE axis ---- (Claude triage applies based on issue body)
- name: bug
  description: Something isn't working as designed.
  color: d73a4a
- name: enhancement
  description: New feature or improvement to existing functionality.
  color: a2eeef
- name: documentation
  description: Improvements or additions to documentation.
  color: 0075ca
- name: question
  description: Further information is requested or clarification needed.
  color: d876e3
- name: idea
  description: Open-ended exploration or unscoped concept; not yet ready to schedule.
  color: ededed

# ---- PRIORITY axis ---- (Claude triage applies; REQUIRED on every classified issue)
- name: p1
  description: Showstopper. Production broken, data loss, or security incident. Drop other work.
  color: b60205
- name: p2
  description: Normal priority. Real bug or commonly requested feature; schedule normally.
  color: d93f0b
- name: p3
  description: Low priority. Minor issue, edge case, or nice-to-have.
  color: fbca04

# ---- SOURCE axis ---- (applied by routines at issue creation, NOT by triage)
- name: sentry
  description: Auto-created from Sentry crash report. Type already classified by routine; triage just escalates priority.
  color: 444444
- name: supabase-advisor
  description: Auto-created from Supabase security/perf advisor. Security area implied; triage escalates priority.
  color: 444444

# ---- SEVERITY axis ---- (applied by routines based on Sentry/Supabase metadata)
- name: severity:error
  description: Crash, exception, or hard failure.
  color: e11d21
- name: severity:warn
  description: Warning-level finding, non-blocking.
  color: f9d71c

# ---- DOMAIN ---- (cross-cutting concern)
- name: security
  description: Security-related issue - RLS, auth bypass, secret exposure, vulnerability, or hardening.
  color: ee0701

# ---- OUTCOME axis ---- (terminal states; humans + occasionally triage)
- name: duplicate
  description: This issue or pull request already exists. Close in favor of original.
  color: cfd3d7
- name: invalid
  description: Empty test, wrong repo, or otherwise not a real issue. Should be closed.
  color: e4e669
- name: wontfix
  description: Working as intended or out of scope. Will not be addressed.
  color: ffffff
- name: good first issue
  description: Well-scoped and well-documented; suitable for new contributors.
  color: 7057ff
- name: help wanted
  description: Extra attention or community contribution welcome.
  color: 008672
