name: Claude

# Triggers and credentials only - all gating logic lives in the
# reusable workflow at astralform-ai/.github. Edit there to change
# behavior across the org.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    uses: astralform-ai/.github/.github/workflows/claude.yml@main
    secrets: inherit
